<!-- class裡面 fs是調整大小 -->
<div class="mb-3">
    <div class="d-flex flex-wrap gap-2">
        {% for tag in tags %}
        <a href="{% url 'tagById_one' tag_id=tag.id %}"
            class="badge fs-6 bg-light text-dark text-decoration-none new-settings">
            #{{ tag.name }}
            </a>
        {% empty %}
            <span class="text-muted">尚未設定標籤</span>
        {% endfor %}
    </div>
</div>
